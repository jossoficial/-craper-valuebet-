name: Sports Betting Multi-Scraper Bot

on:
  schedule:
    # Se ejecuta de forma automática cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Habilita el botón de ejecución manual en la app móvil de GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Inicializar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Librerías
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Análisis de Fuentes
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py
